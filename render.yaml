services:
  # Backend Web Service running Flask API
  - type: web
    name: placement-readiness-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

  # Frontend Static Site hosting React+Vite app
  - type: web
    name: placement-readiness-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: placement-readiness-backend
          property: host
    routes:
      # Redirect all path routes to index.html for React Router compatibility (fixes 404 on refresh)
      - type: rewrite
        source: /*
        destination: /index.html
