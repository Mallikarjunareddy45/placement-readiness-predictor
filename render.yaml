services:
  # Frontend Static Site
  - type: web
    name: placement-readiness-predictor-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    root: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend Web Service
  - type: web
    name: placement-readiness-predictor-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app
    root: .
    envVars:
      - key: PORT
        value: 10000
